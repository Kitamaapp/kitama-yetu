<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitama Yetu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #0F172A; --accent: #10B981; --bg: #F8FAFC; --text: #1E293B; --text-light: #64748B; --border: #E2E8F0; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
        .login-wrapper { width: 100%; max-width: 480px; background: var(--primary); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 40px 30px; }
        .login-header { text-align: center; margin-bottom: 40px; color: white; }
        .logo-badge { width: 70px; height: 70px; background: var(--accent); border-radius: 16px; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4); }
        .login-header h1 { font-size: 28px; font-weight: 600; }
        .login-header p { opacity: 0.7; font-weight: 300; font-size: 14px; margin-top: 5px; }
        .auth-card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--text-light); margin-bottom: 8px; }
        input, select { width: 100%; padding: 14px 16px; border: 1px solid var(--border); border-radius: 12px; font-size: 15px; font-family: 'Poppins', sans-serif; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; background: var(--accent); color: white; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3); }
        
        .app-container { width: 100%; max-width: 480px; background: var(--bg); min-height: 100vh; padding-bottom: 90px; display:none; }
        .app-header { background: white; padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
        .user-badge { background: var(--bg); padding: 8px 12px; border-radius: 20px; font-size: 12px; border: 1px solid var(--border); }
        main { padding: 20px; }
        .section { display: none; } .section.active { display: block; }
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .dash-card { background: white; padding: 20px; border-radius: 16px; box-shadow: var(--shadow); cursor: pointer; border: 1px solid var(--border); }
        .list-card { background: white; padding: 16px; border-radius: 14px; margin-bottom: 12px; box-shadow: var(--shadow); border-left: 4px solid var(--accent); }
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: white; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .nav-item { background: none; border: none; cursor: pointer; font-size: 11px; color: var(--text-light); }
        .nav-item.active { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div class="login-wrapper" id="login-section">
    <div class="login-header">
        <div class="logo-badge">
            <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 14v3M12 14v3M16 14v3"/></svg>
        </div>
        <h1>Kitama Yetu</h1>
        <p>Jukwaa Rasmi la Mawasiliano</p>
    </div>
    <div class="auth-card">
        <div class="form-group">
            <label class="form-label">Jina Kamili</label>
            <input type="text" id="name-input" placeholder="Mfano: Juma Hamisi">
        </div>
        <div class="form-group">
            <label class="form-label">Namba ya Simu</label>
            <input type="tel" id="phone-input" placeholder="0712345678">
        </div>
        <div class="form-group">
            <label class="form-label">Kijiji</label>
            <select id="village-select">
                <option value="">-- Chagua --</option>
                <option value="Kitama Shuleni">Kitama Shuleni</option>
                <option value="Kitama Mjini">Kitama Mjini</option>
                <option value="Mwenge A">Mwenge A</option>
                <option value="Mwenge B">Mwenge B</option>
                <option value="Namunda">Namunda</option>
                <option value="Mitondi A">Mitondi A</option>
                <option value="Mitondi B">Mitondi B</option>
            </select>
        </div>
        <button onclick="handleAuth()" class="btn" id="auth-btn">Ingia / Jisajili</button>
    </div>
</div>

<div class="app-container" id="app-container">
    <header class="app-header">
        <div>
            <p style="font-size:12px; color:var(--text-light);">Karibu</p>
            <h2 id="welcome-msg">Mtumiaji</h2>
        </div>
        <div class="user-badge" id="village-badge">Kijiji</div>
    </header>
    <main>
        <div id="home-section" class="section active">
            <div class="dash-grid">
                <div class="dash-card" onclick="showSection('report-section')"><h4>Tuma Ripoti</h4></div>
                <div class="dash-card" onclick="showSection('my-reports-section')"><h4>Ripoti Zangu</h4></div>
                <div class="dash-card" onclick="showSection('announcements-section')"><h4>Matangazo</h4></div>
                <div class="dash-card" onclick="showSection('leaders-section')"><h4>Viongozi</h4></div>
            </div>
        </div>
        <div id="report-section" class="section">
            <h3>Tuma Malalamishi</h3>
            <input type="text" id="report-title" placeholder="Mada" style="margin-bottom:10px; width:100%; padding:10px;">
            <textarea id="report-desc" placeholder="Ufafanuzi" style="width:100%; padding:10px; margin-bottom:10px; min-height:100px;"></textarea>
            <button onclick="submitReport()" class="btn">Tuma</button>
        </div>
        <div id="my-reports-section" class="section"><h3>Ripoti Zangu</h3><div id="user-reports-list"></div></div>
        <div id="announcements-section" class="section"><h3>Matangazo</h3><div id="announcements-list"></div></div>
        <div id="leaders-section" class="section"><h3>Viongozi</h3><button onclick="handleLogout()" class="btn" style="background:red;">Toka (Logout)</button></div>
    </main>
    <div class="bottom-nav">
        <button class="nav-item active" onclick="showSection('home-section')">Nyumbani</button>
        <button class="nav-item" onclick="showSection('report-section')">Ripoti</button>
        <button class="nav-item" onclick="showSection('announcements-section')">Matangazo</button>
        <button class="nav-item" onclick="showSection('leaders-section')">Viongozi</button>
    </div>
</div>

<script>
    // 1. SUPABASE CONFIG (Tumie jina 'sb' badala ya 'supabase')
    const SUPABASE_URL = 'https://okzqfkghhuymrzgpfxua.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9renFma2doaHV5bXJ6Z3BmeHVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0NzE1ODAsImV4cCI6MjEwMDA0NzU4MH0.XLlfTZHzcEoTBxheUw4LphS-ESdH1OKclQXPTtl9VLI';
    
    let sb;
    try {
        sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    } catch (e) {
        alert("HATARI: Supabase imeshindwa kuanzishwa! " + e.message);
    }

    // 2. LOGIN FUNCTION
    async function handleAuth() {
        const name = document.getElementById('name-input').value.trim();
        const phone = document.getElementById('phone-input').value.trim();
        const village = document.getElementById('village-select').value;

        if (!name || !phone || !village) {
            alert("Tafadhali jaza jina, namba na uchague kijiji.");
            return;
        }

        const btn = document.getElementById('auth-btn');
        btn.innerHTML = 'Inasajili...';
        btn.disabled = true;

        try {
            // Tafuta mtumiaji kwa kutumia 'sb'
            const { data: existingUser, error: fetchError } = await sb
                .from('users')
                .select('*')
                .eq('phone_number', phone)
                .maybeSingle();

            if (fetchError) throw fetchError;

            if (existingUser) {
                alert("Karibu tena " + existingUser.full_name + "! Akaunti yako ipo.");
                localStorage.setItem('kitama_user', JSON.stringify(existingUser));
                enterApp();
            } else {
                alert("Akaunti mpya inatengenezwa...");
                const { data: newUser, error: insertError } = await sb
                    .from('users')
                    .insert([{ full_name: name, phone_number: phone, village: village }])
                    .select()
                    .single();

                if (insertError) throw insertError;

                alert("Umefanikiwa kujisajili!");
                localStorage.setItem('kitama_user', JSON.stringify(newUser));
                enterApp();
            }
        } catch (error) {
            alert("KUMEKUWA NA KOSA: \n" + error.message + "\n\nTafadhali hakikisha ume-run SQL script kwenye Supabase kufungua ruhusa.");
            btn.innerHTML = 'Ingia / Jisajili';
            btn.disabled = false;
        }
    }

    function enterApp() {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('app-container').style.display = 'block';
        const user = JSON.parse(localStorage.getItem('kitama_user'));
        document.getElementById('welcome-msg').innerText = user.full_name;
        document.getElementById('village-badge').innerText = user.village;
    }

    function handleLogout() {
        localStorage.removeItem('kitama_user');
        location.reload();
    }

    function showSection(sectionId) {
        document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(nav => {
            if(nav.getAttribute('onclick').includes(sectionId)) nav.classList.add('active');
        });
    }

    async function submitReport() {
        const user = JSON.parse(localStorage.getItem('kitama_user'));
        const title = document.getElementById('report-title').value;
        const desc = document.getElementById('report-desc').value;
        
        if(!title || !desc) { alert("Jaza mada na ufafanuzi"); return; }

        try {
            const { data, error } = await sb.from('reports').insert([{ title, description: desc, village: user.village }]);
            if(error) throw error;
            alert("Ripoti imetumwa!");
            document.getElementById('report-title').value = '';
            document.getElementById('report-desc').value = '';
            showSection('my-reports-section');
            fetchMyReports();
        } catch(e) {
            alert("Kosa: " + e.message);
        }
    }

    async function fetchMyReports() {
        const user = JSON.parse(localStorage.getItem('kitama_user'));
        const listDiv = document.getElementById('user-reports-list');
        listDiv.innerHTML = '<p>Inapakia...</p>';
        try {
            const { data, error } = await sb.from('reports').select('*').eq('village', user.village).order('created_at', { ascending: false });
            if(error) throw error;
            
            if(data.length > 0) {
                listDiv.innerHTML = data.map(r => `<div class="list-card"><h4>${r.title}</h4><p>${r.description}</p></div>`).join('');
            } else {
                listDiv.innerHTML = '<p>Hakuna ripoti.</p>';
            }
        } catch(e) {
            listDiv.innerHTML = '<p style="color:red;">Kosa: ' + e.message + '</p>';
        }
    }

    window.onload = () => {
        if (localStorage.getItem('kitama_user')) {
            enterApp();
        }
    };
</script>
</body>
</html>
