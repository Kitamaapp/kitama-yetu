<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitama Yetu | Super App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #0F172A; --accent: #059669; --bg: #F1F5F9; --surface: #FFFFFF; --text: #0F172A; --text-sec: #64748B; --border: #E2E8F0; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1); --radius: 16px; --danger: #EF4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
        .auth-c { width: 100%; max-width: 480px; min-height: 100vh; background: var(--surface); display: flex; flex-direction: column; }
        .auth-hero { background: linear-gradient(135deg, var(--primary) 0%, #1E293B 100%); padding: 60px 30px 40px; color: white; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; }
        .auth-logo { width: 50px; height: 50px; background: var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .auth-content { padding: 30px; flex: 1; }
        .auth-tabs { display: flex; background: var(--bg); padding: 5px; border-radius: 12px; margin-bottom: 30px; }
        .auth-tab { flex: 1; text-align: center; padding: 12px; border: none; background: transparent; font-weight: 600; color: var(--text-sec); cursor: pointer; border-radius: 8px; }
        .auth-tab.active { background: var(--surface); color: var(--primary); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .form-g { margin-bottom: 20px; }
        .form-l { display: block; font-size: 12px; font-weight: 600; color: var(--text-sec); margin-bottom: 8px; text-transform: uppercase; }
        .in-wrap { position: relative; }
        .in-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-sec); }
        input, select, textarea { width: 100%; padding: 16px 16px 16px 48px; border: 1px solid var(--border); border-radius: 12px; font-size: 15px; font-family: inherit; background: var(--bg); }
        textarea { padding: 16px; min-height: 80px; resize: vertical; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 4px rgba(5,150,105,0.1); }
        .btn-p { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
        .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .app-c { width: 100%; max-width: 480px; background: var(--bg); min-height: 100vh; padding-bottom: 80px; display: none; }
        .app-h { background: var(--surface); padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; border: 2px solid var(--accent); cursor: pointer; }
        main { padding: 20px; }
        .sec { display: none; animation: slide 0.4s ease; }
        .sec.active { display: block; }
        @keyframes slide { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .sec-h { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .sec-h h2 { font-size: 20px; font-weight: 700; }
        .qa-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .qa-card { background: var(--surface); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); cursor: pointer; border: 1px solid var(--border); }
        .qa-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
        .qa-card h4 { font-size: 15px; font-weight: 700; }
        .qa-card p { font-size: 12px; color: var(--text-sec); }
        
        /* LIST & INTERACTION */
        .list-i { background: var(--surface); padding: 16px; border-radius: var(--radius); margin-bottom: 12px; box-shadow: var(--shadow); border-left: 4px solid var(--accent); }
        .list-i h4 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
        .list-i p { font-size: 13px; color: var(--text-sec); line-height: 1.5; }
        .list-meta { display: flex; gap: 10px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .b-warn { background: #FEF3C7; color: #D97706; } .b-info { background: #DBEAFE; color: #2563EB; } .b-succ { background: #D1FAE5; color: #059669; } .b-err { background: #FEE2E2; color: #EF4444; }
        .b-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--surface); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0 20px 0; z-index: 100; }
        .nav-b { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; color: var(--text-sec); }
        .nav-b.active { color: var(--accent); }
        .nav-b span { font-size: 11px; font-weight: 500; }
        .btn-out { width: 100%; padding: 14px; background: transparent; color: var(--danger); border: 1px solid #FCA5A5; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 20px; }
        .sos-btn { width: 100%; padding: 20px; background: var(--danger); color: white; border: none; border-radius: var(--radius); font-size: 18px; font-weight: 800; cursor: pointer; margin-bottom: 20px; }
        .report-img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; margin-top: 10px; }
        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 12px 20px; border-radius: 8px; box-shadow: var(--shadow); z-index: 200; display: none; font-size: 14px; }
        
        .interaction-bar { display: flex; gap: 10px; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
        .int-btn { background: var(--bg); border: none; padding: 8px 12px; border-radius: 8px; font-weight: 600; font-size: 12px; cursor: pointer; color: var(--text-sec); display: flex; align-items: center; gap: 4px; }
        .int-btn:hover { background: #e2e8f0; }
        .comment-box { background: var(--bg); padding: 12px; border-radius: 8px; margin-top: 10px; display: none; }
        .comment-list { margin-bottom: 10px; max-height: 200px; overflow-y: auto; }
        .comment-item { background: var(--surface); padding: 8px 12px; border-radius: 6px; margin-bottom: 6px; font-size: 13px; }
        .comment-item b { color: var(--primary); font-size: 12px; }
        .comment-item small { color: var(--text-sec); font-size: 10px; }
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- AUTH -->
<div class="auth-c" id="auth-c">
    <div class="auth-hero">
        <div class="auth-logo"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 14v3M12 14v3M16 14v3"/></svg></div>
        <h1>Karibu Kitama Yetu</h1>
        <p>Jukwaa rasmi la mawasiliano, maendeleo na uchumi.</p>
    </div>
    <div class="auth-content">
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">Ingia</button>
            <button class="auth-tab" onclick="switchTab('signup')">Jisajili</button>
        </div>
        <div id="login-form">
            <div class="form-g"><label class="form-l">Namba ya Simu</label><div class="in-wrap"><span class="in-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></span><input type="tel" id="login-phone" placeholder="0712345678"></div></div>
            <button onclick="handleLogin()" class="btn-p" id="btn-login">Ingia</button>
        </div>
        <div id="signup-form" style="display:none;">
            <div class="form-g"><label class="form-l">Jina Kamili</label><div class="in-wrap"><span class="in-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><input type="text" id="su-name" placeholder="Juma Hamisi"></div></div>
            <div class="form-g"><label class="form-l">Namba ya Simu</label><div class="in-wrap"><span class="in-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></span><input type="tel" id="su-phone" placeholder="0712345678"></div></div>
            <div class="form-g"><label class="form-l">Kijiji</label><div class="in-wrap"><span class="in-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 14v3M12 14v3M16 14v3"/></svg></span>
                <select id="su-village"><option value="">Chagua Kijiji</option><option>Kitama Shuleni</option><option>Kitama Mjini</option><option>Mwenge A</option><option>Mwenge B</option><option>Namunda</option><option>Mitondi A</option><option>Mitondi B</option></select></div></div>
            <div class="form-g"><label class="form-l">Hadhi Yako</label><select id="su-role" onchange="togglePin()" style="padding-left:16px;">
                <option value="citizen">Mwananchi</option>
                <option value="mwenyekiti_kitongoji">Mwenyekiti Kitongoji</option>
                <option value="mwenyekiti_kijiji">Mwenyekiti Kijiji</option>
                <option value="mtendaji_kijiji">Mtendaji Kijiji</option>
                <option value="mtendaji_kata">Mtendaji Kata</option>
                <option value="diwani">Diwani</option>
            </select></div>
            <div class="form-g" id="pin-box" style="display:none;"><label class="form-l">PIN ya Kiongozi</label><input type="password" id="leader-pin" placeholder="Weka PIN" style="padding-left:16px;"></div>
            <button onclick="handleSignup()" class="btn-p" id="btn-signup">Tengeneza Akaunti</button>
        </div>
    </div>
</div>

<!-- APP -->
<div class="app-c" id="app-c">
    <header class="app-h">
        <div><p style="font-size:12px; color:var(--text-sec);">Karibu</p><h3 id="w-name">Mtumiaji</h3></div>
        <div class="avatar" onclick="showSec('profile-sec')" id="u-initial">U</div>
    </header>
    <main>
        <div id="home-sec" class="sec active"><div class="sec-h"><h2 id="home-title">Huduma</h2></div><div class="qa-grid" id="home-grid"></div></div>
        <div id="market-sec" class="sec"><div class="sec-h"><h2>Soko la Kitama</h2><span onclick="showSec('add-item-sec')" style="cursor:pointer; color:var(--accent); font-size:13px;">+ Tangaza</span></div><div id="market-list"></div></div>
        <div id="add-item-sec" class="sec"><div class="sec-h"><h2>Tangaza Bidhaa</h2></div><div class="form-g"><input type="text" id="item-name" style="padding-left:16px;" placeholder="Jina la Bidhaa"></div><div class="form-g"><textarea id="item-desc" placeholder="Maelezo"></textarea></div><div class="form-g"><input type="text" id="item-price" style="padding-left:16px;" placeholder="Bei"></div><button onclick="postItem()" class="btn-p">Weka Tangazo</button></div>
        <div id="progress-sec" class="sec"><div class="sec-h"><h2>Maendeleo ya Kata</h2><span onclick="fetchPublicProgress()" style="cursor:pointer; color:var(--accent); font-size:13px;">Refresh</span></div><div id="progress-list"></div></div>
        <div id="report-sec" class="sec"><div class="sec-h"><h2>Tuma Malalamishi</h2></div><div class="form-g"><select id="rep-cat" style="padding-left:16px;"><option>Maji</option><option>Barabara</option><option>Afya</option><option>Usalama</option><option>Elimu</option><option>Mengineyo</option></select></div><div class="form-g"><input type="text" id="rep-title" style="padding-left:16px;" placeholder="Mada Kuu"></div><div class="form-g"><textarea id="rep-desc" placeholder="Ufafanuzi"></textarea></div><div class="form-g"><input type="file" id="rep-image" accept="image/*" style="padding:10px; border-radius:12px; border:1px dashed var(--border);"></div><button onclick="submitReport()" class="btn-p" id="btn-rep">Tuma Ripoti</button></div>
        <div id="leader-reports-sec" class="sec"><div class="sec-h"><h2 id="leader-rep-title">Malalamishi</h2><span onclick="fetchLeaderReports()" style="cursor:pointer; color:var(--accent); font-size:13px;">Refresh</span></div><div id="leader-rep-list"></div></div>
        <div id="profile-sec" class="sec"><div class="sec-h"><h2>Akaunti Yangu</h2></div><div style="text-align:center; margin-bottom:20px;"><div class="avatar" style="width:80px; height:80px; font-size:28px; margin:0 auto 15px;" id="p-ava">U</div><h3 id="p-name">Jina</h3><p id="p-village" style="color:var(--text-sec);">Kijiji</p></div><div style="background:var(--surface); padding:16px; border-radius:12px; margin-bottom:10px;"><strong>Namba:</strong> <span id="p-phone"></span></div><div style="background:var(--surface); padding:16px; border-radius:12px; margin-bottom:10px;"><strong>Hadh:</strong> <span id="p-role"></span></div><button onclick="handleLogout()" class="btn-out">Toka (Logout)</button></div>
    </main>
    <div class="b-nav" id="b-nav"></div>
</div>

<script>
    const SUPABASE_URL = 'https://okzqfkghhuymrzgpfxua.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9renFma2doaHV5bXJ6Z3BmeHVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0NzE1ODAsImV4cCI6MjEwMDA0NzU4MH0.XLlfTZHzcEoTBxheUw4LphS-ESdH1OKclQXPTtl9VLI';
    let sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const LEADER_PINS = { 'mwenyekiti_kitongoji': '5005', 'mwenyekiti_kijiji': '4004', 'mtendaji_kijiji': '3003', 'mtendaji_kata': '2002', 'diwani': '1001' };
    if ('Notification' in window) { Notification.requestPermission(); }
    function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }

    function switchTab(t) { 
        if(t==='login'){document.getElementById('login-form').style.display='block';document.getElementById('signup-form').style.display='none';document.getElementsByClassName('auth-tab')[0].classList.add('active');document.getElementsByClassName('auth-tab')[1].classList.remove('active');} 
        else {document.getElementById('login-form').style.display='none';document.getElementById('signup-form').style.display='block';document.getElementsByClassName('auth-tab')[0].classList.remove('active');document.getElementsByClassName('auth-tab')[1].classList.add('active');} 
    }
    function togglePin() { document.getElementById('pin-box').style.display = document.getElementById('su-role').value !== 'citizen' ? 'block' : 'none'; }

    async function handleLogin() {
        const phone = document.getElementById('login-phone').value.trim();
        if(!phone) return alert("Weka namba");
        const btn = document.getElementById('btn-login'); btn.innerHTML = '<div class="spinner"></div>'; btn.disabled = true;
        try {
            const { data: u, error } = await sb.from('users').select('*').eq('phone_number', phone).maybeSingle();
            if(u) { localStorage.setItem('kitama_user', JSON.stringify(u)); enterApp(); }
            else { alert("Akaunti haijapatikana. Jisajili."); switchTab('signup'); document.getElementById('su-phone').value = phone; }
        } catch(e) { alert("Kosa: "+e.message); } finally { btn.innerHTML='Ingia'; btn.disabled=false; }
    }

    async function handleSignup() {
        const name = document.getElementById('su-name').value.trim();
        const phone = document.getElementById('su-phone').value.trim();
        const village = document.getElementById('su-village').value;
        const role = document.getElementById('su-role').value;
        if(!name||!phone||!village) return alert("Jaza maswali yote");
        if(role !== 'citizen') {
            const enteredPin = document.getElementById('leader-pin').value.trim();
            if(enteredPin !== LEADER_PINS[role]) return alert("PIN si sahihi kwa cheo hicho.");
        }
        const btn = document.getElementById('btn-signup'); btn.innerHTML = '<div class="spinner"></div>'; btn.disabled = true;
        try {
            const { data: u, error } = await sb.from('users').insert([{ full_name:name, phone_number:phone, village:village, role:role }]).select().single();
            if(u) { localStorage.setItem('kitama_user', JSON.stringify(u)); enterApp(); }
        } catch(e) { alert("Kosa: "+e.message); } finally { btn.innerHTML='Tengeneza Akaunti'; btn.disabled=false; }
    }

    function enterApp() {
        document.getElementById('auth-c').style.display='none'; document.getElementById('app-c').style.display='block';
        const u = JSON.parse(localStorage.getItem('kitama_user'));
        document.getElementById('w-name').innerText = u.full_name.split(' ')[0];
        document.getElementById('u-initial').innerText = u.full_name.charAt(0).toUpperCase();
        document.getElementById('p-name').innerText = u.full_name;
        document.getElementById('p-village').innerText = u.village;
        document.getElementById('p-phone').innerText = u.phone_number;
        document.getElementById('p-role').innerText = u.role.replace(/_/g, ' ');
        document.getElementById('p-ava').innerText = u.full_name.charAt(0).toUpperCase();
        setupDashboard(u);
    }

    function setupDashboard(u) {
        const grid = document.getElementById('home-grid'), nav = document.getElementById('b-nav'), title = document.getElementById('home-title');
        let navHtml = `<button class="nav-b active" onclick="showSec('home-sec')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>Nyumbani</span></button>`;
        let gridHtml = '';

        if(u.role === 'citizen') {
            title.innerText = "Huduma Za Kata";
            gridHtml = `<button class="sos-btn" onclick="triggerSOS()">🆘 KIFUNGO CHA DHARURA (SOS)</button>
            <div class="qa-card" onclick="showSec('report-sec')"><div class="qa-icon" style="background:#FEF3C7;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#D97706" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><h4>Tuma Ripoti</h4><p>Na Picha</p></div>
            <div class="qa-card" onclick="showSec('market-sec')"><div class="qa-icon" style="background:#DBEAFE;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2"><path d="M3 9l1-5h16l1 5M5 9v11h14V9M9 22V12h6v10"/></svg></div><h4>Soko la Kitama</h4><p>Tangaza bidhaa</p></div>
            <div class="qa-card" onclick="showSec('progress-sec')"><div class="qa-icon" style="background:#D1FAE5;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2"><path d="M3 3v18h18"/><path d="M18 17V9M13 17V5M8 17v-3"/></svg></div><h4>Maendeleo</h4><p>Shiriki na Piga Maoni</p></div>`;
            navHtml += `<button class="nav-b" onclick="showSec('market-sec')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l1-5h16l1 5M5 9v11h14V9"/></svg><span>Soko</span></button><button class="nav-b" onclick="showSec('profile-sec')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"/></svg><span>Akaunti</span></button>`;
        } else {
            title.innerText = "Dashibodi ya " + u.role.replace(/_/g, ' ');
            gridHtml = `<div class="qa-card" onclick="showSec('leader-reports-sec')"><div class="qa-icon" style="background:#FEF3C7;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#D97706" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg></div><h4>Malalamishi</h4><p>Ya wananchi</p></div>
            <div class="qa-card" onclick="showSec('market-sec')"><div class="qa-icon" style="background:#DBEAFE;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2"><path d="M3 9l1-5h16l1 5M5 9v11h14V9"/></svg></div><h4>Soko</h4><p>La wananchi</p></div>`;
            navHtml += `<button class="nav-b" onclick="showSec('leader-reports-sec')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg><span>Kazi</span></button><button class="nav-b" onclick="showSec('profile-sec')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"/></svg><span>Akaunti</span></button>`;
        }
        grid.innerHTML = gridHtml; nav.innerHTML = navHtml; showSec('home-sec');
    }

    function handleLogout() { localStorage.removeItem('kitama_user'); location.reload(); }

    function showSec(id) {
        document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-b').forEach(n => n.classList.remove('active'));
        document.querySelectorAll('.nav-b').forEach(n => { if(n.getAttribute('onclick').includes(id)) n.classList.add('active'); });
        if(id==='market-sec') fetchMarket();
        if(id==='progress-sec') fetchPublicProgress();
        if(id==='leader-reports-sec') fetchLeaderReports();
    }

    async function triggerSOS() {
        if(!confirm("Tuma arhi ya DHARURA kwa viongozi?")) return;
        const u = JSON.parse(localStorage.getItem('kitama_user'));
        try { await sb.from('reports').insert([{ title: "🚨 DHARURA (SOS)!", description: "Mwananchi anahitaji msaada haraka!", village: u.village, category:"Usalama", is_emergency: true }]); showToast("Arhi imetumwa!"); } catch(e) { alert("Kosa: "+e.message); }
    }

    async function submitReport() {
        const u = JSON.parse(localStorage.getItem('kitama_user'));
        const cat = document.getElementById('rep-cat').value, title = document.getElementById('rep-title').value.trim(), desc = document.getElementById('rep-desc').value.trim(), fileInput = document.getElementById('rep-image');
        if(!title||!desc) return alert("Jaza mada na ufafanuzi");
        const btn = document.getElementById('btn-rep'); btn.innerHTML = '<div class="spinner"></div> Inatuma...'; btn.disabled = true;
        let imgUrl = null;
        if(fileInput.files.length > 0) {
            const fileName = `report_${Date.now()}.jpg`;
            const { error: upErr } = await sb.storage.from('kitama-images').upload(fileName, fileInput.files[0]);
            if(!upErr) { imgUrl = `${SUPABASE_URL}/storage/v1/object/public/kitama-images/${fileName}`; }
        }
        try {
            const { error } = await sb.from('reports').insert([{ title, description:desc, village:u.village, category:cat, image_url:imgUrl, created_by_name: u.full_name, created_by_role: u.role }]);
            if(error) throw error;
            showToast("Ripoti imetumwa!");
            document.getElementById('rep-title').value = ''; document.getElementById('rep-desc').value = ''; if(fileInput) fileInput.value = '';
            showSec('progress-sec');
        } catch(e) { alert("Kosa: "+e.message); } finally { btn.innerHTML='Tuma Ripoti'; btn.disabled=false; }
    }

    function renderReportCard(r, isLeader) {
        const u = JSON.parse(localStorage.getItem('kitama_user'));
        let sClass = r.status === 'pending' ? 'b-warn' : r.status === 'in_progress' ? 'b-info' : 'b-succ';
        let sText = r.status === 'pending' ? 'Inasubiri' : r.status === 'in_progress' ? 'Inashughulikiwa' : 'Imekamilika';
        let imgHtml = r.image_url ? `<img src="${r.image_url}" class="report-img">` : '';
        let resImgHtml = r.resolution_image ? `<img src="${r.resolution_image}" class="report-img" style="border:2px solid var(--accent);">` : '';
        let resNoteHtml = r.resolution_note ? `<div style="background:#D1FAE5; padding:10px; border-radius:8px; margin-top:10px; font-size:13px;"><b>Uthibitisho wa Kiongozi:</b> ${r.resolution_note} <br> <small>-${r.resolved_by_name || 'Kiongozi'}</small></div>` : '';
        
        let actionBtn = '';
        if(isLeader) {
            if(r.status === 'pending') actionBtn = `<button class="btn-p" style="margin-top:10px; padding:8px; font-size:12px; background:var(--bg); color:var(--primary);" onclick="updateStatus('${r.id}','in_progress')">Anza Kushughulikia</button>`;
            else if(r.status === 'in_progress') actionBtn = `<button class="btn-p" style="margin-top:10px; padding:8px; font-size:12px; background:var(--accent); color:white;" onclick="promptResolution('${r.id}', '${u.full_name}')">Kamilisha (Weka Uthibitisho)</button>`;
        }

        return `<div class="list-i">
            <h4>${r.title}</h4>
            <p>${r.description}</p>
            ${imgHtml}
            ${resImgHtml}
            ${resNoteHtml}
            <div class="list-meta">
                <span class="badge b-info">${r.category}</span><span class="badge ${sClass}">${sText}</span><span class="badge b-warn">${r.village}</span>
                <span style="font-size:11px; color:var(--text-sec);">Imetumwa na: ${r.created_by_name || 'Mwananchi'}</span>
            </div>
            <div class="interaction-bar">
                <button class="int-btn" onclick="upvote('${r.id}', ${r.upvotes})">👍 Nakubaliana (${r.upvotes})</button>
                <button class="int-btn" onclick="toggleComments('${r.id}')">💬 Maoni</button>
            </div>
            <div class="comment-box" id="comments-${r.id}">
                <div class="comment-list" id="comment-list-${r.id}"><p style="font-size:12px; color:var(--text-sec);">Inapakia maoni...</p></div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="comment-input-${r.id}" placeholder="Ongeza maoni yako..." style="padding:8px 12px; font-size:13px; border-radius:6px; flex:1;">
                    <button onclick="postComment('${r.id}')" style="padding:8px 12px; background:var(--primary); color:white; border:none; border-radius:6px; cursor:pointer;">Tuma</button>
                </div>
            </div>
            ${actionBtn}
        </div>`;
    }

    async function upvote(id, currentVotes) {
        try { await sb.from('reports').update({ upvotes: currentVotes + 1 }).eq('id', id); fetchPublicProgress(); } catch(e) { alert("Kosa: "+e.message); }
    }

    function toggleComments(id) {
        const box = document.getElementById(`comments-${id}`);
        if(box.style.display === 'block') { box.style.display = 'none'; } 
        else { box.style.display = 'block'; fetchComments(id); }
    }

    async function fetchComments(id) {
        try {
            const { data, error } = await sb.from('comments').select('*').eq('report_id', id).order('created_at', { ascending:true });
            if(error) throw error;
            document.getElementById(`comment-list-${id}`).innerHTML = data.length > 0 ? data.map(c => `<div class="comment-item"><b>${c.author_name} (${c.author_role.replace(/_/g,' ')})</b><br>${c.content}<br><small>${new Date(c.created_at).toLocaleString()}</small></div>`).join('') : '<p style="font-size:12px; color:var(--text-sec);">Hakuna maoni bado.</p>';
        } catch(e) { console.error(e); }
    }

    async function postComment(id) {
        const u = JSON.parse(localStorage.getItem('kitama_user'));
        const content = document.getElementById(`comment-input-${id}`).value.trim();
        if(!content) return;
        try {
            await sb.from('comments').insert([{ report_id: id, author_name: u.full_name, author_role: u.role, content: content }]);
            document.getElementById(`comment-input-${id}`).value = '';
            fetchComments(id);
        } catch(e) { alert("Kosa: "+e.message); }
    }

    async function fetchLeaderReports() {
        const u = JSON.parse(localStorage.getItem('kitama_user'));
        const div = document.getElementById('leader-rep-list'); div.innerHTML = '<p>Inapakia...</p>';
        document.getElementById('leader-rep-title').innerText = u.role === 'diwani' || u.role === 'mtendaji_kata' ? "Malalamishi ya Kata Yote" : "Malalamishi ya " + u.village;
        try {
            let query = sb.from('reports').select('*').order('created_at', { ascending:false });
            if(u.role !== 'diwani' && u.role !== 'mtendaji_kata') query = query.eq('village', u.village);
            const { data, error } = await query;
            if(error) throw error;
            div.innerHTML = data.length > 0 ? data.map(r => renderReportCard(r, true)).join('') : '<p>Hakuna malalamishi kwa sasa.</p>';
        } catch(e) { div.innerHTML = `<p style="color:red;">${e.message}</p>`; }
    }

    async function fetchPublicProgress() {
        const div = document.getElementById('progress-list'); div.innerHTML = '<p>Inapakia maendeleo...</p>';
        try {
            const { data, error } = await sb.from('reports').select('*').order('created_at', { ascending:false });
            if(error) throw error;
            div.innerHTML = data.length > 0 ? data.map(r => renderReportCard(r, false)).join('') : '<p>Hakuna taarifa kwa sasa.</p>';
        } catch(e) { div.innerHTML=`<p style="color:red;">${e.message}</p>`; }
    }

    async function updateStatus(id, newStatus) {
        try { await sb.from('reports').update({ status: newStatus }).eq('id', id); showToast("Status imebadilishwa!"); fetchLeaderReports(); } catch(e) { alert("Kosa: "+e.message); }
    }

    async function promptResolution(id, leaderName) {
        const note = prompt("Andika kile ulichokifanya (Uthibitisho):");
        if(!note) return alert("Lazima uandike uthibitisho.");
        const fileInput = document.createElement('input'); fileInput.type = 'file'; fileInput.accept = 'image/*'; fileInput.click();
        fileInput.onchange = async () => {
            let imgUrl = null;
            if(fileInput.files.length > 0) {
                const fileName = `resolution_${Date.now()}.jpg`;
                const { error: upErr } = await sb.storage.from('kitama-images').upload(fileName, fileInput.files[0]);
                if(!upErr) imgUrl = `${SUPABASE_URL}/storage/v1/object/public/kitama-images/${fileName}`;
            }
            try {
                await sb.from('reports').update({ status: 'resolved', resolution_note: note, resolution_image: imgUrl, resolved_by_name: leaderName }).eq('id', id);
                showToast("Umekamilisha kazi na kuweka uthibitisho!");
                fetchLeaderReports();
            } catch(e) { alert("Kosa: "+e.message); }
        };
    }

    async function postItem() {
        const u = JSON.parse(localStorage.getItem('kitama_user'));
        const name = document.getElementById('item-name').value.trim(), desc = document.getElementById('item-desc').value.trim(), price = document.getElementById('item-price').value.trim();
        if(!name) return alert("Weka jina la bidhaa");
        try {
            const { error } = await sb.from('marketplace').insert([{ item_name:name, description:desc, price:price, phone:u.phone_number, village:u.village }]);
            if(error) throw error;
            showToast("Bidhaa imetangazwa!");
            document.getElementById('item-name').value=''; document.getElementById('item-desc').value=''; document.getElementById('item-price').value='';
            showSec('market-sec');
        } catch(e) { alert("Kosa: "+e.message); }
    }

    async function fetchMarket() {
        const div = document.getElementById('market-list'); div.innerHTML='<p>Inapakia soko...</p>';
        try {
            const { data, error } = await sb.from('marketplace').select('*').order('created_at', { ascending:false });
            if(error) throw error;
            div.innerHTML = data.length > 0 ? data.map(m => `<div class="list-i"><h4>${m.item_name}</h4><p>${m.description || ''}</p><div class="list-meta"><span class="badge b-succ">Bei: ${m.price || 'Agana'}</span><span class="badge b-info">${m.village}</span></div><p style="margin-top:8px; font-size:13px; color:var(--primary); font-weight:600;">📞 ${m.phone}</p></div>`).join('') : '<p>Hakuna bidhaa.</p>';
        } catch(e) { div.innerHTML=`<p style="color:red;">${e.message}</p>`; }
    }

    window.onload = () => { if(localStorage.getItem('kitama_user')) enterApp(); };
</script>
</body>
</html>
